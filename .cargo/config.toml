# Maximum performance configuration for Jules compiler
#
# These flags unlock CPU-specific optimizations (AVX2/FMA/SIMD).
# If you get "illegal instruction" errors on a different machine,
# comment out the target-feature line.

[build]
# Enable native CPU features for maximum performance
rustflags = [
    "-C", "target-cpu=native",
    # Enable common high-performance features on modern x86_64:
    "-C", "target-feature=+avx,+avx2,+fma,+bmi1,+bmi2,+lzcnt",
    # Enable AES-NI for any crypto operations
    "-C", "target-feature=+aes",
    # Enable popcnt for bit counting
    "-C", "target-feature=+popcnt",
    # Enable faster string operations
    "-C", "target-feature=+movbe",
]

[target.x86_64-unknown-linux-gnu]
linker = "cc"
