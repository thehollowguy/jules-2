[package]
name = "jules"
version = "0.1.0"
edition = "2021"
authors = ["jules"]
description = "Jules programming language compiler/interpreter with game dev, ML, and FFI support"
license = "MIT"
autobenches = false

[lib]
name = "jules"
path = "main.rs"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "jules"
path = "main.rs"

[[bin]]
name = "bench-ecs"
path = "benches/bench_ecs.rs"

[[bin]]
name = "bench-chess-ml"
path = "tools/bench_chess_ml.rs"

[[bin]]
name = "bench-jules-ml-chess"
path = "tools/bench_jules_ml_chess.rs"

[[bin]]
name = "bench-mlp-1m"
path = "tools/bench_mlp_1m.rs"

[[bin]]
name = "bench-mlp-hard"
path = "tools/bench_mlp_hard.rs"

[dependencies]
pyo3 = { version = "0.21", features = ["extension-module"], optional = true }
numpy = { version = "0.21", optional = true }
libc = "0.2"
lazy_static = "1.4"
parking_lot = "0.12"
matrixmultiply = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[features]
default = ["ffi-c", "phase1", "phase2"]
python = ["pyo3", "numpy"]
ffi-c = []
phase1 = []
phase2 = []
phase3-jit = []
phase4-llvm = []
phase5-cow = []
phase6-simd = []
full = ["python", "ffi-c", "phase1", "phase2", "phase3-jit", "phase4-llvm", "phase5-cow", "phase6-simd"]
